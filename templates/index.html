<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Books - Recommender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark custom-navbar">
        <div class="container">
            <a class="navbar-brand" href="/">📚 My Book Recommender</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/recommend">Recommend</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="mb-5 text-center fw-bold" style="color: #00a65a;">Top 50 Books</h1>

        <div class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-4">
            {% for i in range(book_name|length) %}
                <div class="col">
                    <div class="card book-card">
                        <img src="{{ image[i] }}" class="card-img-top" alt="Book Cover">
                        <div class="card-body text-center">
                            <p>{{ author[i] }}</p>
                            <h4>{{ book_name[i] }}</h4>
                            <hr style="border-color: #333;">
                            <span class="badge bg-success">Rating: {{ rating[i] | round(1) }}</span>
                            <span class="badge bg-secondary">Votes: {{ votes[i] }}</span>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>
    </div>

</body>
</html>
